{% extends 'base.html' %}
{% block title %}Resend Verification | DeepFake Shield{% endblock %}

{% block content %}
<section class="auth-premium-section">
    <div class="container py-5">
        <div class="row justify-content-center align-items-center min-vh-75">
            <div class="col-lg-5">
                <div class="auth-card-premium">
                    <div class="text-center mb-4">
                        <div class="brand-icon-box mx-auto mb-3">
                            <i class="bi bi-envelope-arrow-up-fill"></i>
                        </div>
                        <h2 class="auth-premium-title">Resend Verification</h2>
                        <p class="auth-premium-subtitle">Enter your email to receive a new verification link.</p>
                    </div>

                    <form method="post">
                        {% csrf_token %}
                        <div class="mb-4">
                            <label class="premium-input-label">Email Address</label>
                            <div class="premium-input-wrap position-relative">
                                <i class="bi bi-envelope-fill premium-input-icon"></i>
                                <input type="email" name="email" class="form-control" placeholder="Enter your email" required>
                            </div>
                        </div>

                        <button type="submit" class="btn btn-glow w-100 btn-lg">
                            <i class="bi bi-send-fill me-2"></i>Resend Verification Email
                        </button>
                    </form>

                    <p class="text-center mt-4 auth-footer-text">
                        Back to <a href="{% url 'login' %}" class="auth-premium-link">Login</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
