{% extends 'base.html' %}
{% block title %}Audio Scan | DeepFake Shield{% endblock %}

{% block content %}
<section class="container py-5">
    <div class="text-center mb-5">
        <div class="section-badge" data-aos="fade-down"><i class="bi bi-soundwave me-2"></i>Audio Detection</div>
        <h1 class="premium-section-title" data-aos="fade-up">Audio <span class="title-gradient">Authenticity</span> Detection</h1>
        <p class="premium-section-desc mx-auto" data-aos="fade-up" data-aos-delay="100">Analyze RMS energy, clipping, and spectral flatness.</p>
    </div>
    <div class="row justify-content-center">
        <div class="col-lg-8" data-aos="zoom-in">
            <div class="upload-card-premium">
                <form method="post" enctype="multipart/form-data">
                    {% csrf_token %}
                    <div class="upload-zone-premium">
                        <div class="upload-zone-icon"><i class="bi bi-mic-fill"></i></div>
                        <div class="upload-zone-ring"></div>
                        <h4>Upload Audio File</h4>
                        <p>Supported: WAV, MP3</p>
                        {{ form.file }}
                    </div>
                    <button type="submit" class="btn btn-glow btn-xl w-100 mt-4"><i class="bi bi-soundwave me-2"></i>Analyze Audio</button>
                </form>
            </div>
        </div>
    </div>
</section>
{% endblock %}
