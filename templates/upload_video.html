{% extends 'base.html' %}
{% block title %}Video Scan | DeepFake Shield{% endblock %}

{% block content %}
<section class="container py-5">
    <div class="text-center mb-5">
        <div class="section-badge" data-aos="fade-down"><i class="bi bi-film me-2"></i>Video Detection</div>
        <h1 class="premium-section-title" data-aos="fade-up">Video <span class="title-gradient">Deepfake</span> Detection</h1>
        <p class="premium-section-desc mx-auto" data-aos="fade-up" data-aos-delay="100">Extract frames and calculate average authenticity.</p>
    </div>
    <div class="row justify-content-center">
        <div class="col-lg-8" data-aos="zoom-in">
            <div class="upload-card-premium">
                <form method="post" enctype="multipart/form-data">
                    {% csrf_token %}
                    <div class="upload-zone-premium">
                        <div class="upload-zone-icon"><i class="bi bi-camera-reels-fill"></i></div>
                        <div class="upload-zone-ring"></div>
                        <h4>Upload Video File</h4>
                        <p>Supported: MP4, MOV, AVI, MKV</p>
                        {{ form.file }}
                    </div>
                    <button type="submit" class="btn btn-glow btn-xl w-100 mt-4"><i class="bi bi-film me-2"></i>Analyze Video</button>
                </form>
            </div>
        </div>
    </div>
</section>
{% endblock %}
