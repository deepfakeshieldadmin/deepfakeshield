{% extends 'base.html' %}
{% block title %}Text Scan | DeepFake Shield{% endblock %}

{% block content %}
<section class="container py-5">
    <div class="text-center mb-5">
        <div class="section-badge" data-aos="fade-down"><i class="bi bi-file-earmark-text-fill me-2"></i>Text Detection</div>
        <h1 class="premium-section-title" data-aos="fade-up">Text <span class="title-gradient">AI</span> Detection</h1>
        <p class="premium-section-desc mx-auto" data-aos="fade-up" data-aos-delay="100">Paste text to analyze for AI-generated patterns.</p>
    </div>
    <div class="row justify-content-center">
        <div class="col-lg-9" data-aos="zoom-in">
            <div class="upload-card-premium">
                <form method="post">
                    {% csrf_token %}
                    <div class="premium-input-group">
                        <label class="premium-input-label"><i class="bi bi-body-text me-1"></i>Paste Your Text</label>
                        {{ form.text }}
                    </div>
                    <button type="submit" class="btn btn-glow btn-xl w-100 mt-4"><i class="bi bi-search me-2"></i>Analyze Text</button>
                </form>
            </div>
        </div>
    </div>
</section>
{% endblock %}
